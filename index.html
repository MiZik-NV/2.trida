<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Procvičování - Rozcestník</title>
    <style>
        :root {
            --primary-color: #3498db;
            --hover-color: #2980b9;
            --bg-color: #f4f7f6;
            --text-color: #2c3e50;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        header {
            margin-top: 40px;
            margin-bottom: 50px;
            text-align: center;
        }

        h1 {
            font-size: 3rem;
            color: var(--text-color);
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 4px solid var(--primary-color);
            padding-bottom: 10px;
        }

        .container {
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            gap: 20px; /* Mezera mezi tlačítky */
        }

        .btn-link {
            display: block;
            text-decoration: none;
            background-color: var(--primary-color);
            color: white;
            padding: 25px 20px; /* Velké polstrování pro prsty */
            text-align: center;
            font-size: 1.5rem;
            font-weight: bold;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.2s, background-color 0.2s, box-shadow 0.2s;
        }

        /* Efekt při dotyku nebo najetí myší */
        .btn-link:hover, .btn-link:active {
            background-color: var(--hover-color);
            transform: translateY(-3px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
        }

        .btn-link:active {
            transform: translateY(0);
        }

        /* Úprava pro velmi malé displeje */
        @media (max-width: 480px) {
            h1 { font-size: 2rem; }
            .btn-link { font-size: 1.2rem; padding: 20px 15px; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Procvičování</h1>
    </header>
    <div class="container">
        <a href="mala_nasobilka2.html" class="btn-link">
            Malá násobilka - Procvičování
        </a>

    </div>
    <div class="container">
        <a href="mala_nasobilka.html" class="btn-link">
            Malá násobilka - Survivor
        </a>

    </div>

</body>
</html>
